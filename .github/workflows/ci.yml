name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify DarkOrbit Unity bridge agent
        working-directory: darkorbit-unity-bridge/agent
        run: npm ci && npm run verify

      - name: Check bundled Unity bridge agent
        working-directory: darkorbit-unity-bridge/agent
        run: git diff --exit-code dist/agent.js

      - name: Restore
        run: dotnet restore DarkBot.Net.slnx

      - name: Build
        run: dotnet build DarkBot.Net.slnx --no-restore -c Release

      - name: Test
        run: dotnet test DarkBot.Net.slnx --no-build -c Release
